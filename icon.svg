<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fdfaf6"/>
      <stop offset="100%" style="stop-color:#f0ebe3"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8922a"/>
      <stop offset="50%" style="stop-color:#d4aa3c"/>
      <stop offset="100%" style="stop-color:#b8922a"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Border ring -->
  <rect x="16" y="16" width="480" height="480" rx="80" fill="none" stroke="#d8cfc4" stroke-width="2"/>
  <!-- Gold star/sparkle ✦ -->
  <text x="256" y="300" font-family="Georgia,serif" font-size="240" font-weight="300" fill="url(#gold)" text-anchor="middle" dominant-baseline="middle">✦</text>
  <!-- H&L text -->
  <text x="256" y="400" font-family="Georgia,serif" font-size="58" font-weight="400" fill="#b8922a" text-anchor="middle" letter-spacing="8">H&amp;L</text>
  <!-- 錢錢 small text -->
  <text x="256" y="448" font-family="sans-serif" font-size="28" font-weight="300" fill="#a8967e" text-anchor="middle" letter-spacing="4">錢錢研究所</text>
</svg>