<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="H&L錢錢">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#f7f3ee">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>H&L錢錢研究所</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=EB+Garamond:ital,wght@0,400;1,400&display=swap');

*{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#f7f3ee;
  --surface:#fdfaf6;
  --surface2:#f0ebe3;
  --surface3:#e8e0d5;
  --border:#d8cfc4;
  --border-light:#ede7de;

  --text:#3d2618;
  --text2:#6b5a4a;
  --text3:#a8967e;
  --text4:#c4b49e;

  --gold:#b8922a;
  --gold2:#d4aa3c;
  --gold3:#e8c96a;
  --gold-bg:#fdf8ed;

  --green:#4a7272;   --green-bg:#edf4f2;
  --red:#8a3a2a;     --red-bg:#f8eeea;
  --blue:#3a5a7a;    --blue-bg:#edf2f8;
  --pink:#8a3a5a;    --pink-bg:#f8edf2;
  --yellow:#7a6a2a;  --yellow-bg:#f8f4e8;
  --purple:#5a3a8a;  --purple-bg:#f0edf8;
  --brown:#6a4a34;   --brown-bg:#f2ede8;

  --radius:4px;
  --radius-sm:3px;
  --shadow:0 2px 20px rgba(42,31,20,0.08);
  --shadow-sm:0 1px 8px rgba(42,31,20,0.05);
}

body{
  font-family:'Noto Sans TC',-apple-system,sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh;
  letter-spacing:0.01em;
  background-image:radial-gradient(ellipse at 50% 0%, rgba(184,146,42,0.06) 0%, transparent 60%);
}

.app{max-width:480px;margin:0 auto;padding-bottom:90px}

/* ── 雜誌感section ── */
.section-no{
  font-family:'Cormorant Garamond',serif;
  font-size:10px;font-weight:500;
  color:var(--gold);letter-spacing:0.3em;text-transform:uppercase;
}
.section-heading{
  font-family:'Cormorant Garamond',serif;
  font-size:20px;font-weight:600;letter-spacing:0.05em;
  color:var(--text);
}
.section-en{
  font-size:9px;font-weight:400;
  color:var(--text3);letter-spacing:0.3em;text-transform:uppercase;
  margin-left:8px;
}
.divider{height:1px;background:var(--border);margin:0 18px}
.divider-gold{height:1px;background:linear-gradient(90deg,transparent,var(--gold3),transparent);margin:0 18px}

/* ── NAV ── */
.bottom-nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:480px;max-width:100%;
  background:rgba(253,250,246,0.97);
  backdrop-filter:blur(16px);
  border-top:1px solid var(--border);
  display:flex;z-index:100;
}
.nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;
  padding:10px 0 14px;font-size:9px;color:var(--text3);
  cursor:pointer;gap:3px;border:none;background:none;
  font-family:inherit;letter-spacing:0.12em;text-transform:uppercase;
  transition:color 0.2s;
}
.nav-btn svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.4;stroke-linecap:round;stroke-linejoin:round}
.nav-btn.active{color:var(--gold)}

/* ── TOP BAR ── */
.top-bar{
  background:rgba(253,250,246,0.97);
  backdrop-filter:blur(12px);
  padding:18px 20px 14px;
  border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:50;
}
.top-bar-inner{display:flex;justify-content:space-between;align-items:flex-end}
.top-bar-left{}
.top-bar-eyebrow{font-size:9px;color:var(--text3);letter-spacing:0.35em;text-transform:uppercase;margin-bottom:5px}
.top-bar-title{
  font-family:'Cormorant Garamond',serif;
  font-size:22px;font-weight:500;letter-spacing:0.06em;color:var(--text);
  line-height:1;
}
.top-bar-title em{font-style:italic;color:var(--gold)}
.top-bar-date{font-size:10px;color:var(--text3);text-align:right;line-height:1.8;letter-spacing:0.06em}

/* ── MONTH BAR ── */
.month-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 20px;background:var(--surface2);border-bottom:1px solid var(--border);
}
.mnav{display:flex;align-items:center;gap:10px}
.mnav button{
  background:none;border:none;cursor:pointer;
  font-size:13px;color:var(--text3);font-family:inherit;
  padding:4px 8px;transition:color 0.15s;
}
.mnav button:hover{color:var(--gold)}
.mlabel{
  font-family:'Cormorant Garamond',serif;
  font-size:18px;font-weight:500;min-width:80px;
  text-align:center;color:var(--text);letter-spacing:0.08em;
}

/* ── SUMMARY ── */
.summary-grid{display:grid;grid-template-columns:1fr 1fr 1fr;padding:0}
.sum-card{
  padding:18px 0 16px;text-align:center;
  border-right:1px solid var(--border-light);
  background:var(--surface);
}
.sum-card:last-child{border-right:none}
.sum-card .sl{
  font-size:8px;color:var(--text3);margin-bottom:7px;
  letter-spacing:0.25em;text-transform:uppercase;
}
.sum-card .sa{
  font-family:'Cormorant Garamond',serif;
  font-size:22px;font-weight:400;font-variant-numeric:tabular-nums;
}
.sum-card.income .sa{color:var(--green)}
.sum-card.expense .sa{color:var(--red)}
.sum-card.balance .sa{color:var(--gold)}
.sum-card .sa-unit{font-size:13px;margin-right:1px}

/* ── PANELS ── */
.panel{display:none}.panel.active{display:block}

/* ── QUICK INPUT ── */
.quick-area{padding:16px 20px 0}
.quick-box{
  border:1px solid var(--border);border-radius:var(--radius);
  padding:14px 16px;background:var(--surface);box-shadow:var(--shadow-sm);
}
.quick-eyebrow{
  font-size:8px;color:var(--text3);letter-spacing:0.2em;
  text-transform:uppercase;margin-bottom:6px;
}
.quick-row{display:flex;gap:8px}
.quick-input{
  flex:1;border:none;border-bottom:1px solid var(--border);
  padding:7px 0;font-size:13px;outline:none;font-family:inherit;
  background:transparent;color:var(--text);transition:border-color 0.2s;
  border-radius:0;
}
.quick-input:focus{border-color:var(--gold)}
.quick-input::placeholder{color:var(--text4)}
.quick-btn{
  background:var(--gold);color:#fdfaf6;border:none;
  padding:8px 18px;font-size:11px;font-weight:500;cursor:pointer;
  font-family:inherit;letter-spacing:0.12em;text-transform:uppercase;
  border-radius:var(--radius);transition:background 0.15s;
}
.quick-btn:hover{background:var(--gold2)}
.quick-preview{margin-top:6px;font-size:10px;color:var(--text3);min-height:14px}
.quick-preview span{color:var(--gold);font-weight:500}

/* ── STEP FORM ── */
.step-area{padding:16px 20px}
.breadcrumb{
  font-size:11px;color:var(--text3);margin-bottom:14px;
  display:flex;align-items:center;gap:6px;flex-wrap:wrap;
  border-bottom:1px solid var(--border-light);padding-bottom:12px;
}
.breadcrumb .bc-item{color:var(--gold);font-weight:500;letter-spacing:0.04em}
.breadcrumb .sep{color:var(--text4)}
.step-title{
  font-size:9px;color:var(--text3);margin-bottom:12px;
  letter-spacing:0.25em;text-transform:uppercase;
}
.grid-btns{display:grid;gap:7px}
.grid-btns.col2{grid-template-columns:1fr 1fr}
.choice-btn{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:11px 8px;text-align:center;
  cursor:pointer;font-size:13px;color:var(--text);transition:all .15s;
  font-family:inherit;letter-spacing:0.02em;
}
.choice-btn:hover{border-color:var(--gold);color:var(--gold)}
.choice-btn.selected{background:var(--gold-bg);border-color:var(--gold);color:var(--gold);font-weight:600}
.choice-btn .ci{font-size:18px;display:block;margin-bottom:4px}
.type-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}
.type-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:14px 8px;text-align:center;
  cursor:pointer;transition:all .15s;font-family:inherit;
}
.type-card:hover{border-color:var(--gold)}
.type-card .ti{font-size:20px;display:block;margin-bottom:5px}
.type-card .tn{font-size:11px;font-weight:500;color:var(--text2);letter-spacing:0.04em}
.type-card.t-expense.selected{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.type-card.t-income.selected{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.type-card.t-saving.selected{background:var(--blue-bg);border-color:var(--blue);color:var(--blue)}
.type-card.t-invest.selected{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.type-card.t-subscription.selected{background:var(--purple-bg);border-color:var(--purple);color:var(--purple)}
.type-card.t-advance.selected{background:var(--yellow-bg);border-color:var(--yellow);color:var(--yellow)}
.type-card.t-mom.selected{background:var(--pink-bg);border-color:var(--pink);color:var(--pink)}
.amount-display{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:20px;text-align:center;margin-bottom:12px;
}
.amount-display .ad-label{font-size:8px;color:var(--text3);margin-bottom:8px;letter-spacing:0.3em;text-transform:uppercase}
.amount-display .ad-val{
  font-family:'Cormorant Garamond',serif;
  font-size:46px;font-weight:300;color:var(--text);letter-spacing:2px;font-variant-numeric:tabular-nums;
}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:12px}
.num-btn{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:16px;font-size:18px;
  cursor:pointer;text-align:center;font-family:inherit;
  color:var(--text);transition:background 0.1s;
}
.num-btn:active{background:var(--surface2)}
.num-btn.del{font-size:13px;color:var(--text2)}
.pay-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.pay-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:11px 13px;cursor:pointer;transition:all .15s;
}
.pay-card:hover{border-color:var(--gold)}
.pay-card.selected{background:var(--gold-bg);border-color:var(--gold)}
.pay-card .pn{font-size:13px;font-weight:500;color:var(--text)}
.pay-card .pb{font-size:10px;color:var(--text3);margin-top:3px;letter-spacing:0.06em}
.pay-card.mom-card-opt.selected{background:var(--pink-bg);border-color:var(--pink)}
.pay-card.mom-card-opt.selected .pn{color:var(--pink)}
.special-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.stag{
  display:flex;align-items:center;gap:5px;padding:6px 14px;
  border:1px solid var(--border);background:var(--surface);font-size:11px;
  color:var(--text2);cursor:pointer;font-family:inherit;transition:all .15s;
  letter-spacing:0.04em;border-radius:var(--radius);
}
.stag.on-adv{background:var(--yellow-bg);border-color:var(--yellow);color:var(--yellow)}
.stag.on-wed{background:var(--pink-bg);border-color:var(--pink);color:var(--pink)}
.note-input{
  width:100%;border:none;border-bottom:1px solid var(--border);
  padding:10px 0;font-size:14px;font-family:inherit;outline:none;
  resize:none;margin-bottom:14px;background:transparent;color:var(--text);
  transition:border-color 0.2s;border-radius:0;
}
.note-input:focus{border-color:var(--gold)}
.note-input::placeholder{color:var(--text4)}
.text-inp{
  width:100%;border:none;border-bottom:1px solid var(--border);
  padding:9px 0;font-size:14px;font-family:inherit;outline:none;
  margin-bottom:10px;background:transparent;color:var(--text);
  transition:border-color 0.2s;border-radius:0;
}
.text-inp:focus{border-color:var(--gold)}
.text-inp::placeholder{color:var(--text4)}
.btn-primary{
  width:100%;background:var(--gold);color:#fdfaf6;border:none;
  padding:14px;font-size:11px;font-weight:500;cursor:pointer;
  font-family:inherit;letter-spacing:0.18em;text-transform:uppercase;
  border-radius:var(--radius);transition:background 0.15s;
}
.btn-primary:hover{background:var(--gold2)}
.step-actions{display:flex;gap:8px;margin-top:14px}
.step-actions .btn-back{
  flex:0 0 80px;background:transparent;border:1px solid var(--border);
  border-radius:var(--radius);padding:10px;font-size:11px;
  cursor:pointer;font-family:inherit;color:var(--text2);letter-spacing:0.08em;
}
.step-actions .btn-next{
  flex:1;background:var(--gold);color:#fdfaf6;border:none;
  border-radius:var(--radius);padding:11px;font-size:11px;font-weight:500;
  cursor:pointer;font-family:inherit;letter-spacing:0.18em;text-transform:uppercase;
}

/* ── RECORDS ── */
.records-area{padding:0 20px}
.day-group{margin-bottom:0}
.day-label{
  display:flex;justify-content:space-between;
  padding:14px 0 8px;
  border-bottom:1px solid var(--border-light);
}
.day-label-left{display:flex;align-items:baseline;gap:8px}
.day-label-date{
  font-family:'Cormorant Garamond',serif;
  font-size:16px;font-weight:400;color:var(--text);
}
.day-label-week{font-size:9px;color:var(--text3);letter-spacing:0.2em;text-transform:uppercase}
.day-label-total{font-size:13px;font-weight:500;font-variant-numeric:tabular-nums}
.record-item{
  display:flex;align-items:center;gap:12px;
  padding:12px 0;border-bottom:1px solid var(--border-light);
  cursor:pointer;transition:background 0.1s;
}
.record-item.is-mom{border-left:2px solid var(--pink);padding-left:12px;margin-left:-12px}
.rec-icon{
  width:34px;height:34px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:16px;flex-shrink:0;
}
.rec-info{flex:1;min-width:0}
.rec-main{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.rec-sub{font-size:10px;color:var(--text3);margin-top:3px;display:flex;gap:5px;align-items:center;letter-spacing:0.04em}
.rec-badge{
  font-size:9px;padding:1px 6px;letter-spacing:0.08em;text-transform:uppercase;
  border:1px solid;border-radius:2px;font-weight:500;
}
.badge-adv{color:var(--yellow);border-color:var(--yellow);background:var(--yellow-bg)}
.badge-wed{color:var(--pink);border-color:var(--pink);background:var(--pink-bg)}
.badge-mom{color:var(--pink);border-color:var(--pink);background:var(--pink-bg)}
.rec-right{text-align:right;flex-shrink:0}
.rec-amount{font-size:15px;font-weight:600;font-variant-numeric:tabular-nums}
.rec-pay{font-size:9px;color:var(--text3);margin-top:2px;letter-spacing:0.04em}
.rec-del{background:none;border:none;cursor:pointer;color:var(--text4);padding:4px;font-size:11px;opacity:0.6}

/* ── CARD SECTIONS ── */
.card-section{
  background:var(--surface);border:1px solid var(--border);
  padding:16px 18px;margin-bottom:10px;
  border-radius:var(--radius);box-shadow:var(--shadow-sm);
}
.card-section-head{
  display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;
  padding-bottom:10px;border-bottom:1px solid var(--border-light);
}
.card-h-left{display:flex;align-items:baseline;gap:8px}
.card-h-no{
  font-family:'Cormorant Garamond',serif;
  font-size:10px;font-weight:500;color:var(--gold);letter-spacing:0.25em;
}
.card-h-title{font-size:14px;font-weight:600;color:var(--text);letter-spacing:0.04em}
.card-h-en{font-size:8px;color:var(--text3);letter-spacing:0.25em;text-transform:uppercase}
.add-btn{
  font-size:9px;padding:4px 12px;letter-spacing:0.12em;text-transform:uppercase;
  color:var(--gold);border:1px solid var(--gold);background:transparent;
  cursor:pointer;font-family:inherit;border-radius:var(--radius);transition:all 0.15s;
}
.add-btn:hover{background:var(--gold-bg)}
/* bar charts */
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.bar-label{font-size:11px;color:var(--text);width:64px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;height:5px;background:var(--surface2);border-radius:2px;overflow:hidden}
.bar-fill{height:100%;border-radius:2px}
.bar-pct{font-size:10px;color:var(--text3);width:30px;text-align:right;flex-shrink:0}
.bar-amt{font-size:11px;font-weight:600;color:var(--text);width:64px;text-align:right;flex-shrink:0}
.budget-row{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.budget-label{font-size:11px;font-weight:500;width:60px;flex-shrink:0;color:var(--text2)}
.budget-track{flex:1;height:6px;background:var(--surface2);border-radius:3px;overflow:hidden}
.budget-fill{height:100%;border-radius:3px;transition:width .4s}
.budget-fill.ok{background:#4a7272}
.budget-fill.warn{background:#c49040}
.budget-fill.over{background:var(--red)}
.budget-nums{font-size:10px;color:var(--text3);width:80px;text-align:right;flex-shrink:0}

/* ── ACCOUNTS ── */
.acct-card{
  background:var(--surface);border:1px solid var(--border);
  padding:16px 18px;margin-bottom:8px;border-radius:var(--radius);
  box-shadow:var(--shadow-sm);
}
.acct-top{display:flex;justify-content:space-between;align-items:flex-start}
.acct-name{font-size:13px;font-weight:600;color:var(--text);letter-spacing:0.04em}
.acct-updated{font-size:9px;color:var(--text4);margin-top:2px;letter-spacing:0.06em}
.acct-type-badge{
  font-size:8px;padding:2px 8px;letter-spacing:0.15em;
  text-transform:uppercase;border:1px solid;border-radius:2px;font-weight:500;
}
.badge-cc{color:var(--purple);border-color:var(--purple);background:var(--purple-bg)}
.badge-bank{color:var(--green);border-color:var(--green);background:var(--green-bg)}
.acct-balance-row{display:flex;justify-content:space-between;margin-top:12px;padding-top:12px;border-top:1px solid var(--border-light)}
.acct-stat .al{font-size:8px;color:var(--text3);margin-bottom:4px;letter-spacing:0.15em;text-transform:uppercase}
.acct-stat .av{
  font-family:'Cormorant Garamond',serif;
  font-size:20px;font-weight:400;font-variant-numeric:tabular-nums;
}
.acct-stat.used .av{color:var(--red)}
.acct-stat.avail .av{color:var(--green)}
.acct-stat.bal .av{color:var(--gold)}
.acct-prog{margin-top:10px}
.acct-prog .pt{display:flex;justify-content:space-between;font-size:9px;color:var(--text3);margin-bottom:4px;letter-spacing:0.06em}
.acct-prog .bar-track{height:4px}

/* ── MOM CARD ── */
.mom-summary-card{
  background:var(--pink-bg);border:1px solid rgba(138,58,90,0.2);
  padding:16px 18px;margin-bottom:8px;border-radius:var(--radius);
}

/* ── INSTALLMENT ── */
.inst-card{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--radius);padding:14px;margin-bottom:8px;position:relative;
}
.inst-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.inst-name{font-size:13px;font-weight:600;color:var(--text)}
.inst-sub{font-size:10px;color:var(--text3);margin-top:2px;letter-spacing:0.04em}
.inst-badge{
  font-size:9px;padding:2px 9px;letter-spacing:0.1em;text-transform:uppercase;
  color:var(--gold);border:1px solid var(--gold);background:var(--gold-bg);
  border-radius:2px;font-weight:500;
}
.inst-badge-pink{
  font-size:9px;padding:2px 9px;letter-spacing:0.1em;text-transform:uppercase;
  color:var(--pink);border:1px solid var(--pink);background:var(--pink-bg);
  border-radius:2px;font-weight:500;
}
.bubbles{display:flex;gap:5px;align-items:center;margin-bottom:8px;flex-wrap:wrap}
.bubble{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
.b-done{background:var(--green);color:#fff}
.b-cur{background:var(--gold-bg);color:var(--gold);border:1.5px solid var(--gold)}
.b-fut{background:var(--surface);color:var(--text3);border:1px solid var(--border)}
.b-conn{flex:1;height:1px;background:var(--border);min-width:4px}

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
  import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBQcQygZgpJaxKohOPNeyhpTis_Aop-bNU",
    authDomain: "hl-money.firebaseapp.com",
    projectId: "hl-money",
    storageBucket: "hl-money.firebasestorage.app",
    messagingSenderId: "1039542841259",
    appId: "1:1039542841259:web:a91bc5ef2e699707a52cee",
    measurementId: "G-YE5J4N9950"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // 固定使用同一個用戶文件（私人記帳，不需登入）
  const USER_ID = 'xuechen_hl';
  const docRef = doc(db, 'moneyapp', USER_ID);

  // 上傳資料到 Firebase
  window.syncToCloud = async function(data) {
    try {
      await setDoc(docRef, {
        records: JSON.stringify(data.records||[]),
        repayments: JSON.stringify(data.repayments||[]),
        installments: JSON.stringify(data.installments||[]),
        advances: JSON.stringify(data.advances||[]),
        fixedItems: JSON.stringify(data.fixedItems||[]),
        settings: JSON.stringify(data.settings||{}),
        updatedAt: new Date().toISOString()
      });
      console.log('雲端同步成功');
      window._cloudStatus = 'synced';
      updateSyncBadge('synced');
    } catch(e) {
      console.error('雲端同步失敗', e);
      window._cloudStatus = 'error';
      updateSyncBadge('error');
    }
  };

  // 從 Firebase 載入資料
  window.loadFromCloud = async function() {
    try {
      const snap = await getDoc(docRef);
      if(snap.exists()) {
        const d = snap.data();
        return {
          records: JSON.parse(d.records||'[]'),
          repayments: JSON.parse(d.repayments||'[]'),
          installments: JSON.parse(d.installments||'[]'),
          advances: JSON.parse(d.advances||'[]'),
          fixedItems: JSON.parse(d.fixedItems||'[]'),
          settings: JSON.parse(d.settings||'{}'),
          updatedAt: d.updatedAt
        };
      }
      return null;
    } catch(e) {
      console.error('載入雲端資料失敗', e);
      return null;
    }
  };

  // 即時監聽（其他裝置更新時自動同步）
  window._unsubscribe = onSnapshot(docRef, (snap) => {
    if(snap.exists() && window._firebaseReady) {
      const d = snap.data();
      const remoteTime = d.updatedAt || '';
      const localTime = window._lastSyncTime || '';
      // 只有當雲端比本地新時才更新
      if(remoteTime > localTime && remoteTime !== window._lastSyncTime) {
        window._lastSyncTime = remoteTime;
        try {
          const newRecords = JSON.parse(d.records||'[]');
          const newSettings = JSON.parse(d.settings||'{}');
          // 合併，以雲端為主
          records = newRecords;
          repayments = JSON.parse(d.repayments||'[]');
          installments = JSON.parse(d.installments||'[]');
          advances = JSON.parse(d.advances||'[]');
          fixedItems = JSON.parse(d.fixedItems||'[]');
          Object.assign(settings, newSettings);
          // 更新本地 localStorage
          localStorage.setItem('xz3_rec', d.records);
          localStorage.setItem('xz3_repay', d.repayments);
          localStorage.setItem('xz3_inst', d.installments);
          localStorage.setItem('xz3_adv', d.advances);
          localStorage.setItem('xz3_fixed', d.fixedItems);
          localStorage.setItem('xz3_settings', d.settings);
          updateAll();
          updateSyncBadge('synced');
          console.log('已從雲端更新資料');
        } catch(e) {
          console.error('解析雲端資料失敗', e);
        }
      }
    }
  });

  window._firebaseReady = false;
  window._cloudReady = true;
  console.log('Firebase 初始化完成');
</script>

function load(){
  try{records=JSON.parse(localStorage.getItem('xz3_rec')||'[]');}catch(e){}
  // 合併歷史記錄（只在初次載入時）
  const existingIds=new Set(records.map(r=>r.id));
  const toAdd=HISTORICAL_RECORDS.filter(r=>!existingIds.has(r.id));
  if(toAdd.length>0){records=[...records,...toAdd];localStorage.setItem('xz3_rec',JSON.stringify(records));}
  try{repayments=JSON.parse(localStorage.getItem('xz3_repay')||'[]');}catch(e){}
  try{const s=JSON.parse(localStorage.getItem('xz3_settings'));if(s)settings=Object.assign(settings,s);}catch(e){}
  try{installments=JSON.parse(localStorage.getItem('xz3_inst')||JSON.stringify(defaultInst));}catch(e){installments=defaultInst;}
  // 強制合併新預設分期
  const instIds=new Set(installments.map(i=>i.id));
  const newInsts=defaultInst.filter(i=>!instIds.has(i.id));
  if(newInsts.length>0){installments=[...installments,...newInsts];localStorage.setItem('xz3_inst',JSON.stringify(installments));}
  try{advances=JSON.parse(localStorage.getItem('xz3_adv')||JSON.stringify(defaultAdv));}catch(e){advances=defaultAdv;}
  try{fixedItems=JSON.parse(localStorage.getItem('xz3_fixed')||JSON.stringify(defaultFixed));}catch(e){fixedItems=defaultFixed;}
}
function saveAll(){
  localStorage.setItem('xz3_rec',JSON.stringify(records));
  localStorage.setItem('xz3_repay',JSON.stringify(repayments));
  localStorage.setItem('xz3_settings',JSON.stringify(settings));
  localStorage.setItem('xz3_inst',JSON.stringify(installments));
  localStorage.setItem('xz3_adv',JSON.stringify(advances));
  localStorage.setItem('xz3_fixed',JSON.stringify(fixedItems));
  // 同步到雲端
  if(window.syncToCloud) {
    window._lastSyncTime = new Date().toISOString();
    updateSyncBadge('syncing');
    window.syncToCloud({records,repayments,settings,installments,advances,fixedItems});
  }
}
function updateSyncBadge(status){
  const el = document.getElementById('sync-badge');
  if(!el) return;
  if(status==='syncing'){el.textContent='↑ 同步中';el.style.color='var(--gold)';}
  else if(status==='synced'){el.textContent='✦ 已同步';el.style.color='var(--green)';}
  else{el.textContent='⚠ 同步失敗';el.style.color='var(--red)';}
}

function fmt(n){return '$ '+Math.round(n).toLocaleString();}
function fmtN(n){return Math.round(n).toLocaleString();}

// ====== INSTALLMENT HELPERS ======
function instIsActive(inst,y,m){
  const si=inst.startYear*12+inst.startMonth;
  const ei=si+inst.total-1;
  const ci=y*12+m;
  return ci>=si&&ci<=ei;
}
function instDoneCount(inst,y,m){
  const si=inst.startYear*12+inst.startMonth;
  const ci=y*12+m;
  return Math.min(inst.total,Math.max(0,ci-si+1));
}
function instEndLabel(inst){
  const em=inst.startMonth+inst.total-1;
  return `${inst.startYear+Math.floor(em/12)}年${(em%12)+1}月`;
}
function advIsVisible(adv){return adv.amount-adv.paid>0;}

// ====== MONTH NAV ======
function buildYearSel(){
  const sel=document.getElementById('year-sel');sel.innerHTML='';
  for(let y=2026;y<=2035;y++){const o=document.createElement('option');o.value=y;o.textContent=y+'年';if(y===viewYear)o.selected=true;sel.appendChild(o);}
}
function onYearChange(){viewYear=parseInt(document.getElementById('year-sel').value);updateAll();}
function changeMonth(d){
  viewMonth+=d;
  if(viewMonth<0){viewMonth=11;viewYear--;}
  if(viewMonth>11){viewMonth=0;viewYear++;}
  document.getElementById('year-sel').value=viewYear;
  updateAll();
}
function updateAll(){
  document.getElementById('month-label').textContent=(viewMonth+1)+'月';
  updateSummary();
  const active=document.querySelector('.panel.active');
  if(!active)return;
  const id=active.id;
  if(id==='panel-list')renderRecords();
  if(id==='panel-fixed')renderFixed();
  if(id==='panel-analysis')renderAnalysis();
  if(id==='panel-accounts')renderAccounts();
}
function monthRecs(){
  return records.filter(r=>{const d=new Date(r.date+'T12:00:00');return d.getFullYear()===viewYear&&d.getMonth()===viewMonth;});
}
function updateSummary(){
  const mr=monthRecs();
  // 媽媽卡不計入總支出
  const inc=mr.filter(r=>r.type==='income').reduce((s,r)=>s+r.amount,0);
  const exp=mr.filter(r=>['expense','subscription','advance'].includes(r.type)).reduce((s,r)=>s+r.amount,0);
  const net=inc-exp;
  const fmtCormorant=(n,col)=>`<span style="font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:300;color:${col};font-variant-numeric:tabular-nums">${n<0?'-':''}${Math.abs(Math.round(n)).toLocaleString()}</span>`;
  document.getElementById('sum-income').innerHTML=fmtCormorant(inc,'var(--green)');
  document.getElementById('sum-expense').innerHTML=fmtCormorant(exp,'var(--red)');
  document.getElementById('sum-balance').innerHTML=fmtCormorant(net,net>=0?'var(--gold)':'var(--red)');
}

// ====== STEP FORM ======
function renderBreadcrumb(){
  const parts=[];
  if(draft.type){const t=TYPES.find(x=>x.id===draft.type);parts.push(t?.label);}
  if(draft.cat){const cats=CATS[draft.type]||[];const c=cats.find(x=>x.id===draft.cat);if(c)parts.push(c.label);}
  if(draft.item)parts.push(draft.item);
  if(draft.amount)parts.push(fmt(draft.amount));
  if(draft.payment){const p=PAYMENTS.find(x=>x.id===draft.payment);if(p)parts.push(p.label);}
  document.getElementById('breadcrumb').innerHTML=parts.length
    ?parts.map((p,i)=>`<span class="bc-item">${p}</span>${i<parts.length-1?'<span class="sep"> › </span>':''}`).join('')
    :'<span style="color:var(--text3)">選擇類型開始記帳</span>';
}
function renderStep(){
  renderBreadcrumb();
  const el=document.getElementById('step-content');
  if(step===0){
    el.innerHTML=`<div class="step-title">Select Type · 選擇類型</div>

  }else if(step===1){
    const cats=CATS[draft.type]||[];
    const hasGroups=(draft.type==='expense'||draft.type==='income')&&cats.some(c=>c.group);
    let catHTML='';
    if(hasGroups){
      const groups=[...new Set(cats.map(c=>c.group))];
      const groupLabel={personal:'個人',studio:'工作室'};

        const gc=cats.filter(c=>c.group===g);
        return `<div style="margin-bottom:12px">
          <div style="font-size:8px;color:var(--text3);letter-spacing:0.25em;text-transform:uppercase;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid var(--border-light)">${groupLabel[g]||g}</div>
          <div class="grid-btns col2">${gc.map(c=>`<button class="choice-btn${draft.cat===c.id?' selected':''}" onclick="selCat('${c.id}')"><span class="ci">${c.icon}</span>${c.label}</button>`).join('')}</div>
        </div>`;
      }).join('');
    } else {
      catHTML=`<div class="grid-btns col2">${cats.map(c=>`<button class="choice-btn${draft.cat===c.id?' selected':''}" onclick="selCat('${c.id}')"><span class="ci">${c.icon}</span>${c.label}</button>`).join('')}</div>`;

    </div>`).join('')}</div>
    <div class="step-actions"><button class="btn-back" onclick="goStep(3)">◀ 返回</button><button class="btn-next" onclick="goStep(5)">下一步 ▶</button></div>`;
  }else if(step===5){
    const showSpec=['expense','advance'].includes(draft.type);
    el.innerHTML=`
    ${showSpec?`<div class="step-title">特殊標記</div>
    <div class="special-row">
      <button class="stag${draft.tags.adv?' on-adv':''}" onclick="togTag('adv')">💛 代墊款</button>
      <button class="stag${draft.tags.wed?' on-wed':''}" onclick="togTag('wed')">💍 婚禮</button>
    </div>
    ${draft.tags.adv?`<input type="text" class="text-inp" id="adv-p-inp" value="${draft.advPerson}" placeholder="代墊對象..." oninput="draft.advPerson=this.value">`:''}`:''}

function selType(t){draft.type=t;draft.cat=null;draft.item=null;step=1;renderStep();}

function selItem(i){draft.item=i;step=3;renderStep();}

function togTag(t){draft.tags[t]=!draft.tags[t];renderStep();}
function numPress(k){
  if(k==='⌫')draft.amount=draft.amount.slice(0,-1);

function submitRec(){
  if(!draft.type||!draft.cat||!draft.item){showToast('請完成所有步驟');return;}

// ====== QUICK INPUT ======
function parseQuick(text){
  if(!text.trim())return null;
  const numMatch=text.match(/(\d+(?:\.\d+)?)/);
  if(!numMatch)return null;
  const amount=parseFloat(numMatch[1]);
  const lower=text.toLowerCase();
  for(const m of QUICK_MAP){if(m.kw.some(k=>lower.includes(k.toLowerCase())))return{...m,amount};}
  return{type:'expense',cat:'other',item:text.replace(numMatch[0],'').trim()||'其他',amount};
}
function onQuickInput(){
  const text=document.getElementById('quick-inp').value;
  const r=parseQuick(text);
  const el=document.getElementById('quick-preview');
  if(!r){el.innerHTML='<span style="color:var(--text3)">辨識結果會顯示在這裡</span>';return;}

}

function renderAnalysis(){
  const mr=monthRecs();
  const el=document.getElementById('analysis-area');
  // 媽媽卡不計入支出分析
  const expense=mr.filter(r=>['expense','subscription','advance'].includes(r.type));
  const income=mr.filter(r=>r.type==='income');
  const totalExp=expense.reduce((s,r)=>s+r.amount,0);
  const totalInc=income.reduce((s,r)=>s+r.amount,0);
  const byCat={};
  expense.forEach(r=>{byCat[r.cat]=byCat[r.cat]||{label:r.catLabel,icon:r.catIcon,amount:0};byCat[r.cat].amount+=r.amount;});
  const catRows=Object.entries(byCat).sort((a,b)=>b[1].amount-a[1].amount);
  const barColors=['#b05050','#5070b0','#a06090','#6090b0','#508060','#b07040','#706080','#508070'];
  const budgetRows=Object.entries(settings.budgets).map(([k,b])=>{
    const cat=CATS.expense.find(c=>c.id===k);

        <span>${bill.label}</span>
        ${bill.status==='due'?`<span style="background:var(--red-bg);color:var(--red);font-size:10px;padding:2px 8px;letter-spacing:0.1em;border:1px solid rgba(139,58,42,0.3)">待繳</span>`:`<span style="background:var(--green-bg);color:var(--green);font-size:10px;padding:2px 8px;letter-spacing:0.1em;border:1px solid rgba(74,114,114,0.3)">已繳清</span>`}

        <div class="acct-stat used"><div class="al">帳單</div><div class="av">${fmtN(bill.amount)}</div></div>

      <div class="acct-prog">
        <div class="pt"><span>額度已用 ${pct}%</span><span>可用 ${fmtN(avail)} / ${fmtN(limit)}</span></div>

      <div style="font-size:18px;font-weight:700;color:var(--pink)">${fmtN(momTotal)}</div>
    </div>
    ${momRecs.map(r=>`<div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text2);padding:5px 0;border-bottom:1px solid rgba(176,96,128,0.15)">
      <span>${r.catIcon} ${r.item||r.catLabel} <span style="color:var(--text3)">${r.date}</span></span>
      <span style="color:var(--pink);font-weight:600">-${fmtN(r.amount)}</span>

      const isPink=inst.type==='transfer';

        const cls=n<done?'b-done':n===done?'b-cur':'b-fut';
        return `<div class="bubble ${cls}">${n}</div>${i<inst.total-1?'<div class="b-conn"></div>':''}`;
      }).join('');
      return `<div class="inst-card">
        <button class="inst-del" onclick="deleteInst(${inst.id})">🗑</button>

        </div>
      </div>`;

  const activeAdv=advances.filter(a=>advIsVisible(a));

          <div class="adv-stat"><div class="al">已收</div><div class="av" style="color:var(--green)">${fmtN(a.paid)}</div></div>
          <div class="adv-stat"><div class="al">待收</div><div class="av" style="color:var(--yellow)">${fmtN(remaining)}</div></div>
        </div>
        ${a.paid>0?`<div class="adv-prog"><div class="pt"><span>收款進度</span><span>${pct}%</span></div><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:var(--green)"></div></div></div>`:''}
        <button class="adv-collect" onclick="openCollect(${a.id})">💛 收款</button>
      </div>`;
    }).join('');

  const repayListHTML=monthRepay.length?`<div class="card-section">
    <div class="card-section-head"><div class="card-h-left"><span class="card-h-no">NO.</span><span class="card-h-title">繳卡記錄</span><span class="card-h-en">Payments</span></div></div>
    ${monthRepay.map(r=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px">
      <div><div style="font-weight:500">${r.ccLabel}</div><div style="font-size:11px;color:var(--text3)">${r.date} · 從 ${r.bankLabel}</div></div>
      <div style="display:flex;align-items:center;gap:8px"><div style="color:var(--green);font-weight:600">-${fmtN(r.amount)}</div>
      <button onclick="deleteRepay(${r.id})" style="background:none;border:none;cursor:pointer;color:var(--text3)">🗑</button></div>
    </div>`).join('')}
  </div>`:'';

  el.innerHTML=`<div style="margin-top:10px">
    <button onclick="openRepayModal()" style="width:100%;background:var(--red-bg);border:1px solid rgba(184,96,80,0.3);border-radius:var(--radius-sm);padding:12px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--red);margin-bottom:12px">💳 信用卡繳款</button>
    <div class="section-label">Deposit Accounts</div>${bankHTML}
    ${momHTML}
    <div class="section-label">Credit Cards</div>${ccHTML}
    <div class="card-section">
      <div class="card-section-head"><div class="card-h-left"><span class="card-h-no">NO.</span><span class="card-h-title">分期追蹤</span><span class="card-h-en">Installments</span></div><button class="add-btn" onclick="openModal('inst-modal')">＋ Add</button></div>
      ${instHTML}
    </div>
    <div class="card-section">
      <div class="card-section-head"><div class="card-h-left"><span class="card-h-no">NO.</span><span class="card-h-title">代墊款</span><span class="card-h-en">Advance Tracking</span></div><button class="add-btn" style="color:var(--yellow);border-color:var(--yellow)" onclick="openModal('adv-modal')">＋ Add</button></div>
      ${advHTML}
      ${activeAdv.length>0?`<div style="display:flex;justify-content:space-between;font-size:13px;font-weight:700;padding:8px 0 0;border-top:1px solid rgba(160,128,64,0.2);margin-top:8px"><span style="color:var(--yellow)">合計待收</span><span style="color:var(--yellow)">$ ${fmtN(advTotal)}</span></div>`:''}
    </div>
    ${repayListHTML}
  </div>`;
}

// ====== CC REPAY ======
function openRepayModal(){
  repayDraft={ccId:null,bankId:null};
  const today=new Date();
  document.getElementById('repay-date').value=today.toISOString().slice(0,10);
  document.getElementById('repay-amount').value='';
  document.getElementById('repay-hint').textContent='';
  document.getElementById('repay-cc-list').innerHTML=PAYMENTS.filter(p=>p.type==='cc').map(p=>{
    const bill=settings.ccBill[p.id]||{};
    return `<div class="pay-card" id="rcc-${p.id}" onclick="selRCC('${p.id}',${bill.amount||0})" style="display:flex;justify-content:space-between;align-items:center">
      <div><div class="pn">${p.label}</div><div class="pb">帳單：<span style="color:var(--red);font-weight:600">${fmtN(bill.amount||0)}</span></div></div>
    </div>`;
  }).join('');
  const bankOpts=[...PAYMENTS.filter(p=>p.type==='bank'),{id:'other_pay',label:'其他',type:'other'}];
  document.getElementById('repay-bank-list').innerHTML=bankOpts.map(p=>`
    <div class="pay-card" id="rbk-${p.id}" onclick="selRBK('${p.id}')" style="text-align:center">
      <div class="pn" style="font-size:12px">${p.label}</div>
      <div class="pb">${p.type==='other'?'—':fmtN(settings.bankBalance[p.id]||0)}</div>
    </div>`).join('');
  openModal('repay-modal');
}
function selRCC(id,owed){
  repayDraft.ccId=id;
  document.querySelectorAll('[id^="rcc-"]').forEach(e=>e.classList.remove('selected'));
  document.getElementById('rcc-'+id).classList.add('selected');
  document.getElementById('repay-hint').textContent=`帳單金額：$ ${fmtN(owed)}`;
}
function selRBK(id){
  repayDraft.bankId=id;
  document.querySelectorAll('[id^="rbk-"]').forEach(e=>e.classList.remove('selected'));
  document.getElementById('rbk-'+id).classList.add('selected');
}
function fillFullRepay(){
  if(!repayDraft.ccId){showToast('請先選擇信用卡');return;}
  document.getElementById('repay-amount').value=Math.round(settings.ccBill[repayDraft.ccId]?.amount||0);
}
function submitRepay(){
  if(!repayDraft.ccId){showToast('請選擇信用卡');return;}
  if(!repayDraft.bankId){showToast('請選擇扣款帳戶');return;}
  const amount=parseFloat(document.getElementById('repay-amount').value);
  if(!amount||amount<=0){showToast('請輸入金額');return;}
  const date=document.getElementById('repay-date').value;
  const cc=PAYMENTS.find(p=>p.id===repayDraft.ccId);
  const bk=PAYMENTS.find(p=>p.id===repayDraft.bankId);
  repayments.push({id:Date.now(),ccId:repayDraft.ccId,bankId:repayDraft.bankId,amount,date,ccLabel:cc?.label,bankLabel:bk?.label});
  if(settings.ccBill[repayDraft.ccId]){settings.ccBill[repayDraft.ccId].status='paid';settings.ccBill[repayDraft.ccId].label='已繳清';}
  saveAll();closeModal('repay-modal');updateAll();
  showToast(`✅ 已繳款 ${fmt(amount)}`);
}
function deleteRepay(id){repayments=repayments.filter(r=>r.id!==id);saveAll();updateAll();showToast('已刪除');}

// ====== INST ======
function selInstTotal(n,el){
  document.querySelectorAll('#inst-modal .choice-btn').forEach(b=>b.classList.remove('selected'));
  el.classList.add('selected');if(n>0)document.getElementById('inst-total').value=n;
}
function selInstType(t,el){
  instType=t;
  document.querySelectorAll('#inst-modal .choice-btn').forEach(b=>b.classList.remove('selected'));
  el.classList.add('selected');
}
function submitInst(){
  const name=document.getElementById('inst-name').value.trim();
  const bank=document.getElementById('inst-bank').value.trim();
  const monthly=parseFloat(document.getElementById('inst-monthly').value);
  const total=parseInt(document.getElementById('inst-total').value);
  const year=parseInt(document.getElementById('inst-year').value);
  const month=parseInt(document.getElementById('inst-month-sel').value);
  if(!name||!monthly||!total||!year){showToast('請填寫完整資訊');return;}
  installments.push({id:Date.now(),name,bank,monthly,total,startYear:year,startMonth:month,type:instType});
  saveAll();closeModal('inst-modal');renderAccounts();showToast('✅ 已新增分期');
}
function deleteInst(id){if(!confirm('確定刪除？'))return;installments=installments.filter(i=>i.id!==id);saveAll();renderAccounts();showToast('已刪除');}

// ====== ADVANCE ======
function submitAdv(){
  const person=document.getElementById('adv-person').value.trim();
  const item=document.getElementById('adv-item').value.trim();
  const amount=parseFloat(document.getElementById('adv-amount').value);
  const date=document.getElementById('adv-date').value;
  if(!person||!item||!amount||!date){showToast('請填寫完整資訊');return;}
  advances.push({id:Date.now(),person,item,amount,date,paid:0});
  saveAll();closeModal('adv-modal');renderAccounts();showToast('✅ 已新增代墊款');
}
function deleteAdv(id){if(!confirm('確定刪除？'))return;advances=advances.filter(a=>a.id!==id);saveAll();renderAccounts();showToast('已刪除');}
function openCollect(id){
  collectTargetId=id;
  const a=advances.find(x=>x.id===id);
  document.getElementById('collect-info').textContent=`${a.person} · ${a.item} · 待收 $ ${fmtN(a.amount-a.paid)}`;
  document.getElementById('collect-amount').value='';
  openModal('collect-modal');
}
function fillFullCollect(){const a=advances.find(x=>x.id===collectTargetId);if(a)document.getElementById('collect-amount').value=Math.round(a.amount-a.paid);}
function submitCollect(){
  const amount=parseFloat(document.getElementById('collect-amount').value);
  if(!amount||amount<=0){showToast('請輸入金額');return;}
  const idx=advances.findIndex(a=>a.id===collectTargetId);
  if(idx>=0)advances[idx].paid=Math.min(advances[idx].amount,advances[idx].paid+amount);
  saveAll();closeModal('collect-modal');renderAccounts();
  showToast(`✅ 已收款 ${fmt(amount)}`);
}

    <h3>存款帳戶餘額</h3>
    ${PAYMENTS.filter(p=>p.type==='bank').map(p=>`
      <div class="setting-row"><label>${p.label}</label><input type="number" id="bal-${p.id}" value="${settings.bankBalance[p.id]||0}"></div>`).join('')}
  </div>
  <div class="setting-group">
    <h3>信用卡額度</h3>
    ${PAYMENTS.filter(p=>p.type==='cc').map(p=>`
      <div class="setting-row"><label>${p.label}</label><input type="number" id="lim-${p.id}" value="${settings.ccLimit[p.id]||0}"></div>`).join('')}
  </div>
  <div class="setting-group">
    <h3>信用卡未出帳</h3>
    ${PAYMENTS.filter(p=>p.type==='cc').map(p=>`
      <div class="setting-row"><label>${p.label}</label><input type="number" id="ub-${p.id}" value="${settings.ccUnbilled[p.id]||0}"></div>`).join('')}
  </div>
  <div class="setting-group">
    <h3>信用卡可用額度（實際）</h3>
    ${PAYMENTS.filter(p=>p.type==='cc').map(p=>`
      <div class="setting-row"><label>${p.label}</label><input type="number" id="av-${p.id}" value="${(settings.ccAvail&&settings.ccAvail[p.id])||0}"></div>`).join('')}
  </div>
  <div class="setting-group">
    <h3>月預算設定</h3>
    ${Object.entries(settings.budgets).map(([k,v])=>{
      const cat=CATS.expense.find(c=>c.id===k);
      return `<div class="setting-row"><label>${cat?.icon||'📦'} ${cat?.label||k}</label><input type="number" id="bgt-${k}" value="${v}"></div>`;
    }).join('')}
  </div>
  <button class="setting-save" onclick="saveSettings()">✦ 儲存設定</button>

  <div class="setting-group" style="margin-top:16px">
    <h3>匯出資料</h3>
    <div class="setting-row" style="flex-direction:column;align-items:flex-start;gap:10px">
      <div style="font-size:12px;color:var(--text2);line-height:1.8">
        將所有記帳記錄匯出為 Excel 檔案<br>
        <span style="color:var(--text3);font-size:11px">包含日期、類型、分類、金額、付款方式等</span>
      </div>
      <button onclick="exportExcel()" style="background:var(--gold);color:#fdfaf6;border:none;padding:10px 24px;font-size:10px;font-weight:500;cursor:pointer;font-family:inherit;letter-spacing:0.18em;text-transform:uppercase;border-radius:var(--radius)">
        ↓ 匯出 Excel
      </button>
    </div>
  </div>
  </div>`;
}
function saveSettings(){
  PAYMENTS.filter(p=>p.type==='bank').forEach(p=>{settings.bankBalance[p.id]=parseInt(document.getElementById('bal-'+p.id).value)||0;});
  PAYMENTS.filter(p=>p.type==='cc').forEach(p=>{
    settings.ccLimit[p.id]=parseInt(document.getElementById('lim-'+p.id).value)||0;
    settings.ccUnbilled[p.id]=parseInt(document.getElementById('ub-'+p.id).value)||0;
    if(!settings.ccAvail)settings.ccAvail={};
    const avEl=document.getElementById('av-'+p.id);
    if(avEl)settings.ccAvail[p.id]=parseInt(avEl.value)||0;
  });
  Object.keys(settings.budgets).forEach(k=>{settings.budgets[k]=parseInt(document.getElementById('bgt-'+k).value)||0;});
  saveAll();updateAll();showToast('✅ 設定已儲存');
}


// ====== EXCEL 匯出 ======
function exportExcel(){
  if(typeof XLSX==='undefined'){showToast('載入中，請稍後再試');return;}
  if(!records||records.length===0){showToast('尚無記帳記錄');return;}

  const wb = XLSX.utils.book_new();

  // ── 全部記錄工作表 ──
  const typeLabel={expense:'支出',income:'收入',subscription:'訂閱',advance:'代墊',mom:'媽媽卡',saving:'儲蓄',invest:'投資'};
  const payLabel={kaiji:'凱基銀行',ctbc_b:'中信活期',cathay_b:'國泰CUBE存款',linepay_m:'LINE Pay',cash:'現金',mom_card:'媽媽卡',ctbc_cc:'中信信用卡',taishin:'台新 Richart',cathay_cc:'國泰CUBE卡',other_pay:'其他'};

  const allRows = [
    ['日期','類型','分類','項目','金額','付款方式','備註','媽媽卡','代墊款','代墊對象','婚禮']
  ];
  const sorted = [...records].sort((a,b)=>a.date.localeCompare(b.date));
  sorted.forEach(r=>{
    allRows.push([
      r.date,
      typeLabel[r.type]||r.type,
      r.catLabel||r.cat,
      r.item||'',
      r.amount||0,
      payLabel[r.payment]||r.payment||'',
      r.note||'',
      r.isMom?'是':'',
      r.tags?.adv?'是':'',
      r.advPerson||'',
      r.tags?.wed?'是':'',
    ]);
  });

  const ws_all = XLSX.utils.aoa_to_sheet(allRows);
  // 欄位寬度
  ws_all['!cols']=[{wch:12},{wch:8},{wch:12},{wch:20},{wch:10},{wch:14},{wch:16},{wch:8},{wch:8},{wch:10},{wch:8}];
  XLSX.utils.book_append_sheet(wb, ws_all, '全部記錄');

  // ── 按月份分工作表 ──
  const byMonth={};
  sorted.forEach(r=>{
    const key=r.date.slice(0,7); // YYYY-MM
    if(!byMonth[key])byMonth[key]=[];
    byMonth[key].push(r);
  });

  Object.entries(byMonth).sort().forEach(([ym,recs])=>{
    const label=ym.replace('-','年')+'月';
    const rows=[['日期','類型','分類','項目','金額','付款方式','備註']];
    recs.forEach(r=>{
      rows.push([r.date,typeLabel[r.type]||r.type,r.catLabel||r.cat,r.item||'',r.amount||0,payLabel[r.payment]||r.payment||'',r.note||'']);
    });
    // 加月份合計
    const totalInc=recs.filter(r=>r.type==='income').reduce((s,r)=>s+r.amount,0);
    const totalExp=recs.filter(r=>['expense','subscription','advance'].includes(r.type)).reduce((s,r)=>s+r.amount,0);
    rows.push([]);
    rows.push(['','','','收入合計',totalInc,'','']);
    rows.push(['','','','支出合計',totalExp,'','']);
    rows.push(['','','','結餘',totalInc-totalExp,'','']);

    const ws=XLSX.utils.aoa_to_sheet(rows);
    ws['!cols']=[{wch:12},{wch:8},{wch:12},{wch:20},{wch:10},{wch:14},{wch:16}];
    XLSX.utils.book_append_sheet(wb, ws, label);
  });

  // ── 分期追蹤工作表 ──
  if(installments&&installments.length>0){
    const instRows=[['名稱','銀行/說明','每月金額','總期數','開始年月','結束年月','類型']];
    installments.forEach(inst=>{
      const em=inst.startMonth+inst.total-1;
      const endLabel=`${inst.startYear+Math.floor(em/12)}年${(em%12)+1}月`;
      instRows.push([inst.name,inst.bank,inst.monthly,inst.total,`${inst.startYear}年${inst.startMonth+1}月`,endLabel,inst.type==='transfer'?'每月轉帳':'信用卡分期']);
    });
    const ws_inst=XLSX.utils.aoa_to_sheet(instRows);
    ws_inst['!cols']=[{wch:18},{wch:18},{wch:10},{wch:8},{wch:12},{wch:12},{wch:12}];
    XLSX.utils.book_append_sheet(wb, ws_inst, '分期追蹤');
  }

  // ── 固定支出工作表 ──
  if(fixedItems&&fixedItems.length>0){
    const cycleLabel={monthly:'每月',quarterly:'每季',yearly:'每年',other:'其他'};
    const fixRows=[['名稱','金額','週期','備註','狀態']];
    fixedItems.forEach(f=>{
      fixRows.push([f.name,f.amount,cycleLabel[f.cycle]||f.cycle,f.note||'',f.active?'啟用':'停用']);
    });
    const ws_fix=XLSX.utils.aoa_to_sheet(fixRows);
    ws_fix['!cols']=[{wch:16},{wch:10},{wch:8},{wch:16},{wch:8}];
    XLSX.utils.book_append_sheet(wb, ws_fix, '固定支出');
  }

  // 下載
  const today=new Date();
  const fname=`H&L記帳_${today.getFullYear()}${String(today.getMonth()+1).padStart(2,'0')}${String(today.getDate()).padStart(2,'0')}.xlsx`;
  XLSX.writeFile(wb, fname);
  showToast('✅ Excel 已匯出');
}

// ====== MODAL / NAV / TOAST ======
function openModal(id){document.getElementById(id).classList.remove('hidden');}
function closeModal(id){document.getElementById(id).classList.add('hidden');}
function switchPanel(name){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('panel-'+name).classList.add('active');
  document.getElementById('nav-'+name).classList.add('active');
  if(name==='list')renderRecords();
  if(name==='fixed')renderFixed();
  if(name==='analysis')renderAnalysis();
  if(name==='accounts')renderAccounts();
  if(name==='settings')renderSettings();
}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

// ====== INIT ======
async function init(){
  load(); // 先載入本地資料，讓 UI 快速顯示
  // 嘗試從雲端載入最新資料
  if(window.loadFromCloud) {
    updateSyncBadge('syncing');
    try {
      const cloudData = await window.loadFromCloud();
      if(cloudData) {
        window._lastSyncTime = cloudData.updatedAt || '';
        // 合併：歷史預設記錄保留，雲端資料為主
        if(cloudData.records && cloudData.records.length > 0) {
          // 合併歷史預設記錄
          const existingIds = new Set(cloudData.records.map(r=>r.id));
          const histToAdd = HISTORICAL_RECORDS.filter(r=>!existingIds.has(r.id));
          records = [...cloudData.records, ...histToAdd];
        }
        if(cloudData.repayments) repayments = cloudData.repayments;
        if(cloudData.installments && cloudData.installments.length > 0) installments = cloudData.installments;
        if(cloudData.advances && cloudData.advances.length > 0) advances = cloudData.advances;
        if(cloudData.fixedItems && cloudData.fixedItems.length > 0) fixedItems = cloudData.fixedItems;
        if(cloudData.settings) Object.assign(settings, cloudData.settings);
        updateSyncBadge('synced');
        console.log('已從雲端載入資料');
      } else {
        // 第一次使用，上傳本地資料到雲端
        window._lastSyncTime = new Date().toISOString();
        window.syncToCloud({records,repayments,settings,installments,advances,fixedItems});
      }
    } catch(e) {
      console.log('雲端載入失敗，使用本地資料', e);
      updateSyncBadge('error');
    }
  }
  window._firebaseReady = true;
  const today=new Date();
  const wd='日一二三四五六';
  document.getElementById('today-str').textContent=`${today.getFullYear()}年${today.getMonth()+1}月${today.getDate()}日（週${wd[today.getDay()]}）`;
  document.getElementById('inst-year').value=today.getFullYear();
  document.getElementById('inst-month-sel').value=today.getMonth();
  document.getElementById('adv-date').value=today.toISOString().slice(0,10);
  buildYearSel();
  document.getElementById('month-label').textContent=(viewMonth+1)+'月';
  updateAll();
  renderStep();
}
init();
</script>
